version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./rhero.db
    volumes:
      - ./backend:/app
      - ./data:/app/data
    restart: unless-stopped

